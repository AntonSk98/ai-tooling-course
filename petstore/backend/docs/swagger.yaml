basePath: /
definitions:
  petstore_internal_models.Category:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  petstore_internal_models.CategoryReference:
    properties:
      id:
        example: 1
        type: integer
    type: object
  petstore_internal_models.CreateCategoryRequest:
    properties:
      name:
        example: Dogs
        type: string
    type: object
  petstore_internal_models.CreatePetRequest:
    properties:
      category:
        $ref: '#/definitions/petstore_internal_models.CategoryReference'
      name:
        example: Balu
        type: string
      status:
        allOf:
        - $ref: '#/definitions/petstore_internal_models.PetStatus'
        example: available
    type: object
  petstore_internal_models.Pet:
    properties:
      category:
        $ref: '#/definitions/petstore_internal_models.Category'
      id:
        type: integer
      name:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/petstore_internal_models.PetStatus'
        description: Status pet status in the store
    type: object
  petstore_internal_models.PetStatus:
    enum:
    - available
    - pending
    - sold
    type: string
    x-enum-varnames:
    - PetStatusAvailable
    - PetStatusPending
    - PetStatusSold
host: localhost:3000
info:
  contact:
    email: support@petstore.io
    name: API Support
  description: REST API for a petstore application built with Go Fiber
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Petstore API
  version: "1.0"
paths:
  /category:
    post:
      consumes:
      - application/json
      description: Add a new category with the input payload. ID will be auto-generated,
        omit it from the request.
      parameters:
      - description: Category object that needs to be added (without id)
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/petstore_internal_models.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add a new category to the store
      tags:
      - categories
    put:
      consumes:
      - application/json
      description: Update an existing category by Id
      parameters:
      - description: Category object that needs to be updated
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/petstore_internal_models.Category'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Category'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update an existing category
      tags:
      - categories
  /category/{categoryId}:
    delete:
      description: Delete a category by ID
      parameters:
      - description: Category ID
        in: path
        name: categoryId
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Deletes a category
      tags:
      - categories
  /category/listAll:
    get:
      description: Returns a list of all categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/petstore_internal_models.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all categories
      tags:
      - categories
  /pet:
    post:
      consumes:
      - application/json
      description: Add a new pet with the input payload. ID will be auto-generated,
        omit it from the request.
      parameters:
      - description: Pet object that needs to be added (without id)
        in: body
        name: pet
        required: true
        schema:
          $ref: '#/definitions/petstore_internal_models.CreatePetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Pet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Add a new pet to the store
      tags:
      - pets
    put:
      consumes:
      - application/json
      description: Update an existing pet by Id
      parameters:
      - description: Pet object that needs to be updated
        in: body
        name: pet
        required: true
        schema:
          $ref: '#/definitions/petstore_internal_models.Pet'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Pet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update an existing pet
      tags:
      - pets
  /pet/{petId}:
    delete:
      description: Deletes a pet by ID
      parameters:
      - description: Pet id to delete
        in: path
        name: petId
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Deletes a pet
      tags:
      - pets
    get:
      description: Returns a single pet
      parameters:
      - description: ID of pet to return
        in: path
        name: petId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Pet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Find pet by ID
      tags:
      - pets
    post:
      description: Updates a pet with form data
      parameters:
      - description: ID of pet that needs to be updated
        in: path
        name: petId
        required: true
        type: integer
      - description: Name of pet
        in: query
        name: name
        type: string
      - description: Status of pet
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/petstore_internal_models.Pet'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Updates a pet in the store with form data
      tags:
      - pets
  /pet/findByStatus:
    get:
      description: Multiple status values can be provided
      parameters:
      - description: Status values
        enum:
        - available
        - pending
        - sold
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/petstore_internal_models.Pet'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Finds pets by status
      tags:
      - pets
schemes:
- http
swagger: "2.0"
