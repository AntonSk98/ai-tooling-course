<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petstore - Pet Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        .animate-slide-down {
            animation: slideDown 0.3s ease-out;
        }
        
        .status-badge {
            @apply px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide;
        }
        .status-available {
            @apply bg-emerald-100 text-emerald-800 ring-1 ring-emerald-200;
        }
        .status-pending {
            @apply bg-amber-100 text-amber-800 ring-1 ring-amber-200;
        }
        .status-sold {
            @apply bg-slate-100 text-slate-700 ring-1 ring-slate-200;
        }
        
        .filter-btn {
            @apply px-5 py-2.5 rounded-xl font-semibold transition-all duration-200 transform;
        }
        .filter-btn-active {
            @apply bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg shadow-blue-500/50 scale-105;
        }
        .filter-btn-inactive {
            @apply bg-white text-gray-700 hover:bg-gray-50 hover:scale-105 border-2 border-gray-200 hover:border-blue-300;
        }
        
        .pet-card {
            @apply transition-all duration-300 hover:scale-[1.02] hover:shadow-xl;
        }
        
        .pet-card-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }
        
        .btn-primary {
            @apply bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 transform hover:scale-105;
        }
        
        .btn-secondary {
            @apply bg-white hover:bg-gray-50 text-gray-700 font-semibold rounded-xl border-2 border-gray-200 hover:border-gray-300 transition-all duration-200;
        }
        
        .input-field {
            @apply w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div x-data="petStore()" x-init="init()">
        <!-- Header -->
        <header class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 shadow-xl">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/20 backdrop-blur-sm rounded-2xl p-3 shadow-lg">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-4xl font-bold text-white tracking-tight">Petstore</h1>
                            <p class="text-sm text-white/80 mt-1 font-medium">Manage your furry friends with style</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <a href="categories.html" 
                           class="px-5 py-2.5 bg-white/20 backdrop-blur-sm border-2 border-white/30 rounded-xl text-white hover:bg-white/30 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg">
                            📋 Categories
                        </a>
                        <button @click="showAddModal = true" 
                                class="px-5 py-2.5 bg-white text-purple-600 rounded-xl hover:bg-white/90 font-bold transition-all duration-200 transform hover:scale-105 shadow-xl">
                            ➕ Add Pet
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Stats Bar -->
            <div class="mb-8 grid grid-cols-1 md:grid-cols-4 gap-4 animate-slide-down">
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-6 text-white shadow-xl">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-blue-100 text-sm font-medium">Total Pets</p>
                            <p class="text-3xl font-bold mt-1" x-text="pets.length"></p>
                        </div>
                        <div class="bg-white/20 rounded-full p-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-2xl p-6 text-white shadow-xl">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-emerald-100 text-sm font-medium">Available</p>
                            <p class="text-3xl font-bold mt-1" x-text="pets.filter(p => p.status === 'available').length"></p>
                        </div>
                        <div class="bg-white/20 rounded-full p-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-amber-500 to-amber-600 rounded-2xl p-6 text-white shadow-xl">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-amber-100 text-sm font-medium">Pending</p>
                            <p class="text-3xl font-bold mt-1" x-text="pets.filter(p => p.status === 'pending').length"></p>
                        </div>
                        <div class="bg-white/20 rounded-full p-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-slate-500 to-slate-600 rounded-2xl p-6 text-white shadow-xl">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-slate-100 text-sm font-medium">Sold</p>
                            <p class="text-3xl font-bold mt-1" x-text="pets.filter(p => p.status === 'sold').length"></p>
                        </div>
                        <div class="bg-white/20 rounded-full p-3">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Filter -->
            <div class="mb-8 bg-white rounded-2xl shadow-lg p-6 animate-fade-in">
                <div class="flex items-center gap-4 mb-4">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                    </svg>
                    <h2 class="text-xl font-bold text-gray-800">Filter by Status</h2>
                </div>
                <div class="flex gap-3 flex-wrap">
                    <button @click="filterStatus = 'all'; loadPets()" 
                            :class="filterStatus === 'all' ? 'filter-btn filter-btn-active' : 'filter-btn filter-btn-inactive'">
                        ✨ All Pets
                    </button>
                    <button @click="filterStatus = 'available'; loadPets()" 
                            :class="filterStatus === 'available' ? 'filter-btn filter-btn-active' : 'filter-btn filter-btn-inactive'">
                        🟢 Available
                    </button>
                    <button @click="filterStatus = 'pending'; loadPets()" 
                            :class="filterStatus === 'pending' ? 'filter-btn filter-btn-active' : 'filter-btn filter-btn-inactive'">
                        🟡 Pending
                    </button>
                    <button @click="filterStatus = 'sold'; loadPets()" 
                            :class="filterStatus === 'sold' ? 'filter-btn filter-btn-active' : 'filter-btn filter-btn-inactive'">
                        ⚫ Sold
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div x-show="loading" x-cloak class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-gray-600">Loading pets...</p>
            </div>

            <!-- Error State -->
            <div x-show="error" x-cloak class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-800 font-medium">⚠️ <span x-text="error"></span></p>
            </div>

            <!-- Empty State -->
            <div x-show="!loading && pets.length === 0" x-cloak class="text-center py-16 bg-gradient-to-br from-blue-50 to-purple-50 rounded-3xl shadow-xl border-2 border-dashed border-purple-300 animate-fade-in">
                <div class="text-8xl mb-6 animate-bounce">🐕</div>
                <h3 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-3">No pets found</h3>
                <p class="text-gray-600 mb-8 text-lg">Start your pet collection journey today!</p>
                <button @click="showAddModal = true" 
                        class="px-8 py-4 btn-primary text-lg">
                    <span class="flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Add First Pet
                    </span>
                </button>
            </div>

            <!-- Pet Grid -->
            <div x-show="!loading && pets.length > 0" x-cloak 
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="pet in pets" :key="pet.id">
                    <div class="pet-card bg-white rounded-2xl shadow-lg border-2 border-gray-100 overflow-hidden animate-fade-in">
                        <!-- Pet Header with Gradient -->
                        <div class="pet-card-gradient p-6 text-white relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16"></div>
                            <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full -ml-12 -mb-12"></div>
                            <div class="relative">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="bg-white/20 backdrop-blur-sm rounded-xl px-3 py-1">
                                        <p class="text-xs font-semibold text-white/80">ID: <span x-text="pet.id"></span></p>
                                    </div>
                                    <div class="text-5xl animate-bounce">🐾</div>
                                </div>
                                <h3 class="text-2xl font-bold text-white mb-2" x-text="pet.name"></h3>
                                <div class="flex items-center gap-2">
                                    <span :class="`status-badge status-${pet.status || 'available'}`" 
                                          x-text="pet.status || 'available'">
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Pet Details -->
                        <div class="p-6">
                            <div class="space-y-3 mb-6">
                                <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl" x-show="pet.category">
                                    <div class="bg-purple-100 rounded-lg p-2">
                                        <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <p class="text-xs text-gray-500 font-medium">Category</p>
                                        <p class="text-sm font-bold text-gray-900" x-text="pet.category?.name || 'N/A'"></p>
                                    </div>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="flex gap-3">
                                <button @click="editPet(pet)" 
                                        class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl hover:from-blue-600 hover:to-blue-700 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                    Edit
                                </button>
                                <button @click="deletePet(pet.id)" 
                                        class="px-4 py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl hover:from-red-600 hover:to-red-700 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg shadow-red-500/30 flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <!-- Add Pet Modal -->
        <div x-show="showAddModal" x-cloak 
             class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in"
             @click.self="showAddModal = false">
            <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden animate-slide-down" @click.stop>
                <!-- Modal Header -->
                <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-6 text-white">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-3xl font-bold">Add New Pet</h2>
                            <p class="text-blue-100 text-sm mt-1">Fill in the details below</p>
                        </div>
                        <button @click="showAddModal = false" 
                                class="text-white/80 hover:text-white hover:bg-white/20 rounded-full p-2 transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Form -->
                <form @submit.prevent="createPet()" class="p-6 space-y-5">
                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            Pet Name *
                        </label>
                        <input type="text" 
                               x-model="newPet.name" 
                               required
                               class="input-field"
                               placeholder="e.g., Rex, Fluffy, Tweety">
                    </div>

                    <!-- Status -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Status
                        </label>
                        <select x-model="newPet.status" 
                                class="input-field">
                            <option value="available">🟢 Available</option>
                            <option value="pending">🟡 Pending</option>
                            <option value="sold">⚫ Sold</option>
                        </select>
                    </div>

                    <!-- Category -->
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                            <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                            </svg>
                            Category (Optional)
                        </label>
                        <select x-model="newPet.categoryId" 
                                class="input-field">
                            <option value="">None</option>
                            <template x-for="cat in categories" :key="cat.id">
                                <option :value="cat.id" x-text="cat.name"></option>
                            </template>
                        </select>
                    </div>

                    <!-- Error Display -->
                    <div x-show="formError" x-cloak 
                         class="bg-red-50 border-2 border-red-200 rounded-xl p-4 animate-fade-in">
                        <p class="text-red-800 text-sm font-semibold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span x-text="formError"></span>
                        </p>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-3 pt-4">
                        <button type="button" 
                                @click="showAddModal = false" 
                                class="flex-1 px-6 py-3 btn-secondary">
                            Cancel
                        </button>
                        <button type="submit" 
                                :disabled="submitting"
                                class="flex-1 px-6 py-3 btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!submitting" class="flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                Add Pet
                            </span>
                            <span x-show="submitting" x-cloak class="flex items-center justify-center gap-2">
                                <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Adding...
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Pet Modal -->
        <div x-show="showEditModal" x-cloak 
             class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
             @click.self="showEditModal = false">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6" @click.stop>
                <!-- Modal Header -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">Edit Pet</h2>
                    <button @click="showEditModal = false" 
                            class="text-gray-400 hover:text-gray-600 text-2xl">
                        ×
                    </button>
                </div>

                <!-- Form -->
                <form @submit.prevent="updatePet()" class="space-y-4">
                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Pet Name *
                        </label>
                        <input type="text" 
                               x-model="editingPet.name" 
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <!-- Status -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Status
                        </label>
                        <select x-model="editingPet.status" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="available">Available</option>
                            <option value="pending">Pending</option>
                            <option value="sold">Sold</option>
                        </select>
                    </div>

                    <!-- Category -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Category (Optional)
                        </label>
                        <select x-model="editingPet.categoryId" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="">None</option>
                            <template x-for="cat in categories" :key="cat.id">
                                <option :value="cat.id" x-text="cat.name"></option>
                            </template>
                        </select>
                    </div>

                    <!-- Error Display -->
                    <div x-show="formError" x-cloak 
                         class="bg-red-50 border border-red-200 rounded-lg p-3">
                        <p class="text-red-800 text-sm" x-text="formError"></p>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-3 pt-4">
                        <button type="button" 
                                @click="showEditModal = false" 
                                class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">
                            Cancel
                        </button>
                        <button type="submit" 
                                :disabled="submitting"
                                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!submitting">Update</span>
                            <span x-show="submitting" x-cloak>Updating...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function petStore() {
            return {
                // State
                pets: [],
                categories: [],
                filterStatus: 'all',
                loading: false,
                error: null,
                formError: null,
                submitting: false,
                
                // Modals
                showAddModal: false,
                showEditModal: false,
                
                // Forms
                newPet: {
                    name: '',
                    status: 'available',
                    categoryId: ''
                },
                editingPet: {
                    id: null,
                    name: '',
                    status: 'available',
                    categoryId: ''
                },

                // Initialize
                async init() {
                    await this.loadCategories();
                    await this.loadPets();
                },

                // Load pets
                async loadPets() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        if (this.filterStatus === 'all') {
                            // Load all pets by fetching each status
                            const statuses = ['available', 'pending', 'sold'];
                            const allPets = [];
                            
                            for (const status of statuses) {
                                const response = await fetch(`/pet/findByStatus?status=${status}`);
                                if (response.ok) {
                                    const pets = await response.json();
                                    allPets.push(...pets);
                                }
                            }
                            
                            this.pets = allPets;
                        } else {
                            // Load pets by specific status
                            const response = await fetch(`/pet/findByStatus?status=${this.filterStatus}`);
                            if (!response.ok) {
                                // If it's a 400, it might just mean no pets, try to parse
                                if (response.status === 400) {
                                    this.pets = [];
                                    return;
                                }
                                throw new Error('Failed to load pets');
                            }
                            
                            this.pets = await response.json();
                        }
                    } catch (err) {
                        this.error = err.message;
                        this.pets = [];
                    } finally {
                        this.loading = false;
                    }
                },

                // Load categories
                async loadCategories() {
                    try {
                        const response = await fetch('/category/listAll');
                        if (!response.ok) throw new Error('Failed to load categories');
                        
                        this.categories = await response.json();
                    } catch (err) {
                        console.error('Failed to load categories:', err);
                    }
                },

                // Create pet
                async createPet() {
                    this.submitting = true;
                    this.formError = null;
                    
                    try {
                        const payload = {
                            name: this.newPet.name,
                            status: this.newPet.status
                        };
                        
                        if (this.newPet.categoryId) {
                            payload.category = { id: parseInt(this.newPet.categoryId) };
                        }
                        
                        const response = await fetch('/pet', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || error.message || 'Failed to create pet');
                        }
                        
                        // Reset form and close modal
                        this.newPet = { name: '', status: 'available', categoryId: '' };
                        this.showAddModal = false;
                        
                        // Reload pets
                        await this.loadPets();
                    } catch (err) {
                        this.formError = err.message;
                    } finally {
                        this.submitting = false;
                    }
                },

                // Edit pet (prepare)
                editPet(pet) {
                    this.editingPet = {
                        id: pet.id,
                        name: pet.name,
                        status: pet.status || 'available',
                        categoryId: pet.category?.id || ''
                    };
                    this.showEditModal = true;
                    this.formError = null;
                },

                // Update pet
                async updatePet() {
                    this.submitting = true;
                    this.formError = null;
                    
                    try {
                        const payload = {
                            id: this.editingPet.id,
                            name: this.editingPet.name,
                            status: this.editingPet.status
                        };
                        
                        if (this.editingPet.categoryId) {
                            payload.category = { id: parseInt(this.editingPet.categoryId) };
                        }
                        
                        const response = await fetch('/pet', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || error.message || 'Failed to update pet');
                        }
                        
                        // Close modal and reload
                        this.showEditModal = false;
                        await this.loadPets();
                    } catch (err) {
                        this.formError = err.message;
                    } finally {
                        this.submitting = false;
                    }
                },

                // Delete pet
                async deletePet(petId) {
                    if (!confirm('Are you sure you want to delete this pet?')) {
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/pet/${petId}`, {
                            method: 'DELETE'
                        });
                        
                        if (!response.ok) {
                            throw new Error('Failed to delete pet');
                        }
                        
                        // Reload pets
                        await this.loadPets();
                    } catch (err) {
                        this.error = err.message;
                    }
                }
            };
        }
    </script>
</body>
</html>
