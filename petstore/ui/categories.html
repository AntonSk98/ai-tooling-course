<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petstore - Category Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        .animate-slide-down {
            animation: slideDown 0.3s ease-out;
        }
        
        .btn-primary {
            @apply bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-200 transform hover:scale-105;
        }
        
        .btn-secondary {
            @apply bg-white hover:bg-gray-50 text-gray-700 font-semibold rounded-xl border-2 border-gray-200 hover:border-gray-300 transition-all duration-200;
        }
        
        .input-field {
            @apply w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200;
        }
        
        .category-card {
            @apply transition-all duration-300 hover:scale-[1.01] hover:shadow-lg;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div x-data="categoryStore()" x-init="init()">
        <!-- Header -->
        <header class="bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 shadow-xl">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/20 backdrop-blur-sm rounded-2xl p-3 shadow-lg">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-4xl font-bold text-white tracking-tight">Categories</h1>
                            <p class="text-sm text-white/80 mt-1 font-medium">Organize your pets efficiently</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <a href="index.html" 
                           class="px-5 py-2.5 bg-white/20 backdrop-blur-sm border-2 border-white/30 rounded-xl text-white hover:bg-white/30 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg">
                            🐾 Back to Pets
                        </a>
                        <button @click="showAddModal = true" 
                                class="px-5 py-2.5 bg-white text-purple-600 rounded-xl hover:bg-white/90 font-bold transition-all duration-200 transform hover:scale-105 shadow-xl">
                            ➕ Add Category
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Loading State -->
            <div x-show="loading" x-cloak class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-gray-600">Loading categories...</p>
            </div>

            <!-- Error State -->
            <div x-show="error" x-cloak class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
                <p class="text-red-800 font-medium">⚠️ <span x-text="error"></span></p>
            </div>

            <!-- Empty State -->
            <div x-show="!loading && categories.length === 0" x-cloak 
                 class="text-center py-16 bg-gradient-to-br from-purple-50 to-pink-50 rounded-3xl shadow-xl border-2 border-dashed border-purple-300 animate-fade-in">
                <div class="text-8xl mb-6 animate-bounce">📋</div>
                <h3 class="text-3xl font-bold bg-gradient-to-r from-purple-600 to-pink-600 bg-clip-text text-transparent mb-3">No categories yet</h3>
                <p class="text-gray-600 mb-8 text-lg">Create your first category to organize pets!</p>
                <button @click="showAddModal = true" 
                        class="px-8 py-4 btn-primary text-lg">
                    <span class="flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Create First Category
                    </span>
                </button>
            </div>

            <!-- Category List -->
            <div x-show="!loading && categories.length > 0" x-cloak class="bg-white rounded-2xl shadow-xl border-2 border-gray-100 overflow-hidden animate-fade-in">
                <div class="divide-y-2 divide-gray-100">
                    <template x-for="category in categories" :key="category.id">
                        <div class="category-card p-6 hover:bg-gradient-to-r hover:from-purple-50 hover:to-pink-50 flex items-center justify-between">
                            <!-- Category Info -->
                            <div class="flex items-center gap-4 flex-1">
                                <div class="bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl p-4 shadow-lg">
                                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                                    </svg>
                                </div>
                                <div>
                                    <h3 class="text-xl font-bold text-gray-900" x-text="category.name"></h3>
                                    <p class="text-sm text-gray-500 mt-1">
                                        ID: <span class="font-mono bg-gray-100 px-2 py-0.5 rounded" x-text="category.id"></span>
                                    </p>
                                </div>
                            </div>

                            <!-- Actions -->
                            <div class="flex gap-3">
                                <button @click="editCategory(category)" 
                                        class="px-5 py-2.5 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl hover:from-blue-600 hover:to-blue-700 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg shadow-blue-500/30 flex items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                    Edit
                                </button>
                                <button @click="deleteCategory(category.id)" 
                                        class="px-4 py-2.5 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl hover:from-red-600 hover:to-red-700 font-semibold transition-all duration-200 transform hover:scale-105 shadow-lg shadow-red-500/30">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Stats -->
            <div x-show="!loading && categories.length > 0" x-cloak 
                 class="mt-6 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl p-6 text-white shadow-xl animate-fade-in">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 backdrop-blur-sm rounded-xl p-3">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-white/80 text-sm font-medium">Total Categories</p>
                        <p class="text-3xl font-bold" x-text="categories.length"></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Add Category Modal -->
        <div x-show="showAddModal" x-cloak 
             class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
             @click.self="showAddModal = false">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6" @click.stop>
                <!-- Modal Header -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">Add New Category</h2>
                    <button @click="showAddModal = false" 
                            class="text-gray-400 hover:text-gray-600 text-2xl">
                        ×
                    </button>
                </div>

                <!-- Form -->
                <form @submit.prevent="createCategory()" class="space-y-4">
                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Category Name *
                        </label>
                        <input type="text" 
                               x-model="newCategory.name" 
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="e.g., Dogs, Cats, Birds">
                    </div>

                    <!-- Error Display -->
                    <div x-show="formError" x-cloak 
                         class="bg-red-50 border border-red-200 rounded-lg p-3">
                        <p class="text-red-800 text-sm" x-text="formError"></p>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-3 pt-4">
                        <button type="button" 
                                @click="showAddModal = false" 
                                class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">
                            Cancel
                        </button>
                        <button type="submit" 
                                :disabled="submitting"
                                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!submitting">Add Category</span>
                            <span x-show="submitting" x-cloak>Adding...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Category Modal -->
        <div x-show="showEditModal" x-cloak 
             class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
             @click.self="showEditModal = false">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6" @click.stop>
                <!-- Modal Header -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">Edit Category</h2>
                    <button @click="showEditModal = false" 
                            class="text-gray-400 hover:text-gray-600 text-2xl">
                        ×
                    </button>
                </div>

                <!-- Form -->
                <form @submit.prevent="updateCategory()" class="space-y-4">
                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Category Name *
                        </label>
                        <input type="text" 
                               x-model="editingCategory.name" 
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>

                    <!-- Error Display -->
                    <div x-show="formError" x-cloak 
                         class="bg-red-50 border border-red-200 rounded-lg p-3">
                        <p class="text-red-800 text-sm" x-text="formError"></p>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-3 pt-4">
                        <button type="button" 
                                @click="showEditModal = false" 
                                class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium">
                            Cancel
                        </button>
                        <button type="submit" 
                                :disabled="submitting"
                                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!submitting">Update</span>
                            <span x-show="submitting" x-cloak>Updating...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function categoryStore() {
            return {
                // State
                categories: [],
                loading: false,
                error: null,
                formError: null,
                submitting: false,
                
                // Modals
                showAddModal: false,
                showEditModal: false,
                
                // Forms
                newCategory: {
                    name: ''
                },
                editingCategory: {
                    id: null,
                    name: ''
                },

                // Initialize
                async init() {
                    await this.loadCategories();
                },

                // Load categories
                async loadCategories() {
                    this.loading = true;
                    this.error = null;
                    
                    try {
                        const response = await fetch('/category/listAll');
                        if (!response.ok) throw new Error('Failed to load categories');
                        
                        const data = await response.json();
                        this.categories = Array.isArray(data) ? data : [];
                        console.log('Loaded categories:', this.categories);
                    } catch (err) {
                        this.error = err.message;
                        this.categories = [];
                        console.error('Error loading categories:', err);
                    } finally {
                        this.loading = false;
                    }
                },

                // Create category
                async createCategory() {
                    this.submitting = true;
                    this.formError = null;
                    
                    try {
                        const response = await fetch('/category', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: this.newCategory.name })
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || error.message || 'Failed to create category');
                        }
                        
                        // Reset form and close modal
                        this.newCategory = { name: '' };
                        this.showAddModal = false;
                        
                        // Reload categories
                        await this.loadCategories();
                    } catch (err) {
                        this.formError = err.message;
                    } finally {
                        this.submitting = false;
                    }
                },

                // Edit category (prepare)
                editCategory(category) {
                    this.editingCategory = {
                        id: category.id,
                        name: category.name
                    };
                    this.showEditModal = true;
                    this.formError = null;
                },

                // Update category
                async updateCategory() {
                    this.submitting = true;
                    this.formError = null;
                    
                    try {
                        const response = await fetch('/category', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                id: this.editingCategory.id,
                                name: this.editingCategory.name
                            })
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.error || error.message || 'Failed to update category');
                        }
                        
                        // Close modal and reload
                        this.showEditModal = false;
                        await this.loadCategories();
                    } catch (err) {
                        this.formError = err.message;
                    } finally {
                        this.submitting = false;
                    }
                },

                // Delete category
                async deleteCategory(categoryId) {
                    if (!confirm('Are you sure you want to delete this category? Pets using this category will lose their category assignment.')) {
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/category/${categoryId}`, {
                            method: 'DELETE'
                        });
                        
                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.message || 'Failed to delete category');
                        }
                        
                        // Reload categories
                        await this.loadCategories();
                    } catch (err) {
                        this.error = err.message;
                    }
                }
            };
        }
    </script>
</body>
</html>
